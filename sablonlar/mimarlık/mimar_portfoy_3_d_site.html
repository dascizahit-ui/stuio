<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Arka - React Mimarlık Portföyü</title>
<meta name="description" content="React JSX olarak hazırlanan mimarlık portföy şablonunun GitHub Pages üzerinde çalışan HTML sürümü.">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #11100d; }
  #boot-error {
    display: none;
    min-height: 100vh;
    place-items: center;
    padding: 32px;
    background: #11100d;
    color: #fff;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #boot-error.visible { display: grid; }
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-error">
  <div style="max-width: 680px;">
    <h1 style="font-size: 32px; margin-bottom: 12px;">Şablon yüklenemedi</h1>
    <p style="color: rgba(255,255,255,.68); line-height: 1.7;">
      Bu sayfa React JSX dosyasını tarayıcıda çalıştırır. İnternet bağlantısını ve
      <code>mimar_portfoy_3_d_site.jsx</code> dosyasının aynı klasörde olduğunu kontrol edin.
    </p>
  </div>
</div>

<script>
(async function () {
  const React = window.React;
  const ReactDOM = window.ReactDOM;
  const { useMemo, useState, Fragment } = React;

  function passthroughTag(tag) {
    return React.forwardRef(function MotionShim(props, ref) {
      const { initial, animate, exit, transition, whileHover, whileTap, layout, ...rest } = props;
      return React.createElement(tag, { ...rest, ref }, rest.children);
    });
  }

  const motion = new Proxy({}, {
    get(_target, tag) {
      return passthroughTag(tag);
    }
  });

  function AnimatePresence(props) {
    return React.createElement(Fragment, null, props.children);
  }

  function icon(pathData) {
    return function Icon({ size = 24, className = "", ...props }) {
      return React.createElement("svg", {
        width: size,
        height: size,
        viewBox: "0 0 24 24",
        fill: "none",
        stroke: "currentColor",
        strokeWidth: 1.8,
        strokeLinecap: "round",
        strokeLinejoin: "round",
        className,
        ...props
      }, pathData.map((path, index) => {
        if (path.type === "circle") return React.createElement("circle", { key: index, ...path.attrs });
        return React.createElement("path", { key: index, d: path.d });
      }));
    };
  }

  const ArrowUpRight = icon([{ d: "M7 17 17 7" }, { d: "M7 7h10v10" }]);
  const Building2 = icon([{ d: "M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18" }, { d: "M6 12H4a2 2 0 0 0-2 2v8h20v-8a2 2 0 0 0-2-2h-2" }, { d: "M10 6h4" }, { d: "M10 10h4" }, { d: "M10 14h4" }, { d: "M10 18h4" }]);
  const ChevronRight = icon([{ d: "m9 18 6-6-6-6" }]);
  const Layers3 = icon([{ d: "m12 2 10 5-10 5L2 7l10-5Z" }, { d: "m2 17 10 5 10-5" }, { d: "m2 12 10 5 10-5" }]);
  const MapPin = icon([{ d: "M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z" }, { type: "circle", attrs: { cx: 12, cy: 10, r: 3 } }]);
  const Menu = icon([{ d: "M4 6h16" }, { d: "M4 12h16" }, { d: "M4 18h16" }]);
  const MousePointer2 = icon([{ d: "m4 4 7.07 16.97 2.51-7.39 7.39-2.51L4 4z" }, { d: "m13 13 6 6" }]);
  const X = icon([{ d: "M18 6 6 18" }, { d: "m6 6 12 12" }]);

  try {
    const response = await fetch("./mimar_portfoy_3_d_site.jsx", { cache: "no-store" });
    if (!response.ok) throw new Error("JSX dosyası okunamadı.");

    let source = await response.text();
    source = source.replace(/import React[\s\S]*?from "lucide-react";\s*/m, "");
    source = source.replace("export default function ArchitectPortfolioSite", "function ArchitectPortfolioSite");

    const compiled = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]]
    }).code;

    const run = new Function(
      "React", "ReactDOM", "useMemo", "useState", "motion", "AnimatePresence",
      "ArrowUpRight", "Building2", "ChevronRight", "Layers3", "MapPin", "Menu", "MousePointer2", "X",
      compiled + "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ArchitectPortfolioSite));"
    );

    run(React, ReactDOM, useMemo, useState, motion, AnimatePresence, ArrowUpRight, Building2, ChevronRight, Layers3, MapPin, Menu, MousePointer2, X);
  } catch (error) {
    console.error(error);
    document.getElementById("boot-error").classList.add("visible");
  }
})();
</script>
</body>
</html>
